name: Build and deploy app

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(c(
            "shinylive",
            "shiny", "bslib", "visNetwork", "dplyr", "tidyr", "readxl",
            "lubridate", "igraph", "plotly", "DT", "purrr", "tibble",
            "ggplot2", "jsonlite", "DiagrammeR"
          ))

      # Copy only the files the Shiny app needs into a clean directory.
      # Prevents shinylive scanning tools/ and picking up unrelated packages.
      - name: Prepare app directory
        run: |
          mkdir app_export
          cp app.R app_export/
          cp VERSION app_export/

      - name: Export app to static site
        shell: Rscript {0}
        run: shinylive::export("app_export", "site")

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
