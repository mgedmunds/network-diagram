name: Build and deploy Shinylive PoC

on:
  push:
    branches: [shinylive-poc]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(c(
            "shinylive",
            "shiny", "bslib", "visNetwork", "igraph", "plotly", "DT",
            "dplyr", "lubridate", "jsonlite", "readxl"
          ))

      - name: Export PoC app to static site
        shell: Rscript {0}
        run: shinylive::export("poc", "site")

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
